name: Build Mac App

on: [push]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 升级到 v4

      - name: 安装 Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: 安装打包工具
        run: pip install pyinstaller

      - name: 开始打包
        run: pyinstaller -F -w rename_tool.py

      - name: 上传成果物
        uses: actions/upload-artifact@v4 # 关键修正：这里必须改用 v4
        with:
          name: Mac-Version-App
          path: dist/rename_tool
